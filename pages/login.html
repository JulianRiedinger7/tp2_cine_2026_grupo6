<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cine Aurora 📽️ - Login</title>
    <meta name="description" content="Cine Aurora - Login" />
    <link rel="icon" href="../assets/favicon/logo-cine.png" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>

  <body>
    <header>
      <div>
        <h1>Cine Aurora</h1>
        <img src="../assets/favicon/logo-cine.png" alt="logo-cine-aurora" />
      </div>
      <div>
        <nav>
          <a href="../index.html">Inicio</a>
          <a href="./estrenos.html">Próximos estrenos</a>
          <a href="../index.html">Volver</a>
        </nav>
      </div>
    </header>
    <main >
      <form class="form-container" action="perfil.html">
        <fieldset>
          <legend>Bienvenido a Cine Aurora</legend>
          <h2>Acceso Clientes</h2>
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-container">
              <i class="fa fa-envelope-o"></i>
              <input class="input-field" type="email" id="email" placeholder="E-mail" />
            </div>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-container">
              <i class="fa fa-key" aria-hidden="true"></i>
              <input id="password" class="input-field" type="password" required placeholder="Contraseña"/>
            </div>
          </div>

          
          <button class="btn-ok" type="submit">Ingresar</button>
        <p>¿No eres miembro? <a href="registro.html">Regístrate</a></p></fieldset>
      </form>
    </main>

    <footer>
      <p>&copy; 2026 Cine Aurora - Todos los derechos reservados</p>
    </footer>
  </body>
</html>
